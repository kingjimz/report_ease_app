<div *ngIf="showPrompt" class="md-toast">
  <div class="md-toast-content">
    <div class="md-toast-icon">
      <mat-icon>notifications_active</mat-icon>
    </div>
    <div class="md-toast-text">
      <p class="md-toast-title">Enable Notifications</p>
      <p class="md-toast-message" *ngIf="!isBlocked">
        Get daily reminders to join ministry plus end-of-month report alerts.
      </p>
      <p class="md-toast-message" *ngIf="isBlocked">
        Notifications are currently blocked. Please enable them in your browser settings to receive daily ministry reminders and report alerts.
      </p>
    </div>
    <div class="md-toast-actions">
      <button mat-flat-button color="primary" (click)="requestPermission()" [disabled]="isRequesting">
        {{ isRequesting ? 'Enabling...' : 'Enable' }}
      </button>
      <button *ngIf="!isBlocked" mat-icon-button (click)="dismissPrompt()" aria-label="Dismiss">
        <mat-icon>close</mat-icon>
      </button>
    </div>
  </div>
</div>
