<div *ngIf="showPrompt" class="md-toast">
  <div class="md-toast-content">
    <div class="md-toast-icon">
      <mat-icon>install_mobile</mat-icon>
    </div>
    <div class="md-toast-text">
      <p class="md-toast-title">Install App</p>
      <p class="md-toast-message">Add to home screen for quick access</p>
    </div>
    <div class="md-toast-actions">
      <button mat-flat-button color="primary" (click)="installApp()">Install</button>
      <button mat-icon-button (click)="dismissPrompt()" aria-label="Dismiss">
        <mat-icon>close</mat-icon>
      </button>
    </div>
  </div>
</div>
