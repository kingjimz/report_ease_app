<div *ngIf="showPrompt" class="md-toast">
  <div class="md-toast-content">
    <div class="md-toast-icon">
      <mat-icon>refresh</mat-icon>
    </div>
    <div class="md-toast-text">
      <p class="md-toast-title">Update Available</p>
      <p class="md-toast-message">
        A new version of the app is available. Update now to get the latest features and improvements.
      </p>
    </div>
    <div class="md-toast-actions">
      <button mat-flat-button color="primary" (click)="updateApp()" [disabled]="isUpdating">
        {{ isUpdating ? 'Updating...' : 'Update' }}
      </button>
      <button mat-icon-button (click)="dismissPrompt()" aria-label="Dismiss">
        <mat-icon>close</mat-icon>
      </button>
    </div>
  </div>
</div>
