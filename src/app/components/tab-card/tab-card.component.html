<nav class="md-bottom-nav">
  <button
    *ngFor="let tab of tabs.slice(0, 2)"
    type="button"
    matRipple
    [matRippleCentered]="false"
    class="md-nav-item"
    [class.active]="activeTab === tab.id"
    (click)="selectTab(tab.id)"
  >
    <span class="md-nav-indicator">
      <mat-icon [class.fill]="activeTab === tab.id">{{ tab.icon }}</mat-icon>
    </span>
    <span class="md-nav-label">{{ tab.title }}</span>
  </button>

  <!-- Center FAB: add report -->
  <button
    type="button"
    class="md-nav-fab"
    aria-label="Add report"
    matRipple
    [matRippleCentered]="true"
    (click)="openAddReportModal()"
  >
    <mat-icon>add</mat-icon>
  </button>

  <button
    *ngFor="let tab of tabs.slice(2)"
    type="button"
    matRipple
    [matRippleCentered]="false"
    class="md-nav-item"
    [class.active]="activeTab === tab.id"
    (click)="selectTab(tab.id)"
  >
    <span class="md-nav-indicator">
      <mat-icon [class.fill]="activeTab === tab.id">{{ tab.icon }}</mat-icon>
    </span>
    <span class="md-nav-label">{{ tab.title }}</span>
  </button>
</nav>
