<div
  *ngIf="showTutorial"
  class="tutorial-backdrop"
  (click)="skipTutorial()"
>
  <mat-card
    appearance="outlined"
    class="tutorial-modal w-full max-w-md mx-4 p-6 sm:p-8 relative"
    (click)="$event.stopPropagation()"
  >
    <!-- Progress -->
    <div class="mb-6">
      <div class="flex items-center justify-between mb-2">
        <span class="text-xs font-medium" style="color: var(--mat-sys-on-surface-variant);">
          Step {{ currentStep + 1 }} of {{ steps.length }}
        </span>
        <span class="text-xs font-medium" style="color: var(--mat-sys-on-surface-variant);">
          {{ Math.round(progress) }}%
        </span>
      </div>
      <mat-progress-bar mode="determinate" [value]="progress"></mat-progress-bar>
    </div>

    <!-- Step Content -->
    <div class="text-center mb-6">
      <!-- Icon -->
      <div class="tutorial-icon-badge mx-auto mb-4">
        <mat-icon class="tutorial-icon-symbol">{{ currentStepData.icon }}</mat-icon>
      </div>

      <!-- Title -->
      <h2 class="text-2xl font-bold mb-3" style="color: var(--mat-sys-on-surface);">
        {{ currentStepData.title }}
      </h2>

      <!-- Description -->
      <p class="leading-relaxed text-base" style="color: var(--mat-sys-on-surface-variant);">
        {{ currentStepData.description }}
      </p>
    </div>

    <!-- Step Indicators -->
    <div class="flex justify-center gap-2 mb-6">
      <div
        *ngFor="let step of steps; let i = index"
        class="tutorial-dot"
        [class.active]="i === currentStep"
      ></div>
    </div>

    <!-- Action Buttons -->
    <div class="flex gap-3 items-center">
      <button mat-button class="flex-1" (click)="skipTutorial()">
        Skip
      </button>
      <button
        mat-stroked-button
        *ngIf="!isFirstStep"
        (click)="previousStep()"
        aria-label="Previous step"
      >
        <mat-icon>arrow_back</mat-icon>
      </button>
      <button
        mat-flat-button
        color="primary"
        class="flex-1"
        (click)="isLastStep ? completeTutorial() : nextStep()"
      >
        {{ isLastStep ? 'Get Started' : 'Next' }}
        <mat-icon *ngIf="!isLastStep">arrow_forward</mat-icon>
      </button>
    </div>
  </mat-card>
</div>
