<!-- chart.component.html -->

<div class="chart-wrapper">
  <div style="width: 100%; height: 300px; position: relative;">
    <canvas
      #chartCanvas
      style="width: 100% !important; height: 100% !important"
    ></canvas>
    <div
      *ngIf="!reportData || reportData.length === 0"
      class="absolute inset-0 flex flex-col items-center justify-center rounded-lg md-chart-empty"
    >
      <div class="md-chart-empty-icon mb-4">
        <mat-icon>show_chart</mat-icon>
      </div>
      <p class="font-medium" style="color: var(--mat-sys-on-surface-variant);">No report data available</p>
      <p class="text-sm mt-1" style="color: var(--mat-sys-outline);">Start adding reports to see your activity chart</p>
    </div>
  </div>
</div>
