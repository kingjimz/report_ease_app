<div class="fixed inset-0 z-[10000] flex flex-col justify-end">
  <!-- Backdrop -->
  <div class="app-sheet-fade absolute inset-0 bg-gray-900 bg-opacity-50 backdrop-blur-sm"></div>

  <!-- Bottom sheet (leaves space at the top, never covers the full screen) -->
  <div
    class="modal-container app-sheet-up relative w-full max-w-2xl mx-auto rounded-t-2xl shadow-2xl border border-b-0 max-h-[88vh] flex flex-col"
    style="box-sizing: border-box;"
  >
    <!-- Drag handle -->
    <div class="flex justify-center pt-2.5 pb-1 flex-shrink-0">
      <span class="modal-drag-handle"></span>
    </div>

    <!-- Scrollable content -->
    <div
      class="overflow-y-auto overflow-x-hidden px-4 sm:px-6 pb-5 pt-1 w-full min-w-0"
      style="box-sizing: border-box;"
    >
      <ng-content></ng-content>
    </div>
  </div>
</div>
