<div class="min-h-screen flex items-center justify-center px-4" style="background: var(--mat-sys-surface);">
  <form (submit)="login(); $event.preventDefault()" class="w-full max-w-md">
    <div class="px-2 py-6">
      <h2 class="text-2xl font-bold" style="color: var(--mat-sys-on-surface);">Welcome back</h2>
      <p class="mt-1" style="color: var(--mat-sys-on-surface-variant);">Sign in to continue</p>
    </div>

    <div class="px-2 py-4 space-y-2">
      <mat-form-field appearance="fill" class="w-full">
        <mat-label>Email</mat-label>
        <mat-icon matPrefix>mail</mat-icon>
        <input
          matInput
          type="email"
          [(ngModel)]="email"
          placeholder="you@example.com"
          name="email"
          required
          [disabled]="!isOnline"
        />
      </mat-form-field>

      <mat-form-field appearance="fill" class="w-full">
        <mat-label>Password</mat-label>
        <mat-icon matPrefix>lock</mat-icon>
        <input
          matInput
          type="password"
          [(ngModel)]="password"
          placeholder="••••••••"
          name="password"
          required
          [disabled]="!isOnline"
        />
      </mat-form-field>

      <button
        mat-flat-button
        color="primary"
        type="submit"
        class="w-full md-tall-btn"
        [disabled]="isLoading || !isOnline"
      >
        <mat-spinner *ngIf="isLoading" diameter="20"></mat-spinner>
        <span *ngIf="!isLoading" class="inline-flex items-center gap-2">
          <mat-icon>login</mat-icon> Sign In
        </span>
      </button>

      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full" style="border-top: 1px solid var(--mat-sys-outline-variant);"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="px-2" style="background: var(--mat-sys-surface); color: var(--mat-sys-on-surface-variant);">Or continue with</span>
        </div>
      </div>

      <button
        mat-stroked-button
        type="button"
        (click)="signInWithGoogle()"
        class="w-full md-tall-btn"
        [disabled]="isLoading || !isOnline"
      >
        <span class="inline-flex items-center gap-3">
          <svg class="w-5 h-5" viewBox="0 0 24 24">
            <path
              fill="currentColor"
              d="M21.35 11.1h-9.17v2.73h6.51c-.33 3.81-3.5 5.44-6.5 5.44C8.36 19.27 5 16.25 5 12c0-4.1 3.2-7.27 7.2-7.27 3.09 0 4.9 1.97 4.9 1.97L19 4.72S16.56 2 12.1 2C6.42 2 2.03 6.8 2.03 12c0 5.05 4.13 10 10.22 10 5.35 0 9.25-3.67 9.25-9.09 0-1.15-.15-1.81-.15-1.81z"
            />
          </svg>
          Sign in with Google
        </span>
      </button>

      <div class="text-center mt-6">
        <p class="text-sm" style="color: var(--mat-sys-on-surface-variant);">
          Don't have an account?
          <a routerLink="/register" class="font-medium" style="color: var(--mat-sys-primary);">
            Create an account
          </a>
        </p>
      </div>

      <app-alerts *ngIf="errorMessage" [isSuccess]="false" [alertMessage]="errorMessage"></app-alerts>
    </div>
  </form>
</div>
