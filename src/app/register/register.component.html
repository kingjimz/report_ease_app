<div class="min-h-screen flex items-center justify-center px-4" style="background: var(--mat-sys-surface);">
  <div class="w-full max-w-md">
    <div class="px-2 py-6">
      <h2 class="text-2xl font-bold" style="color: var(--mat-sys-on-surface);">Join us</h2>
      <p class="mt-1" style="color: var(--mat-sys-on-surface-variant);">Create your account</p>
    </div>

    <div class="px-2 py-4 space-y-2">
      <mat-form-field appearance="fill" class="w-full">
        <mat-label>Email</mat-label>
        <mat-icon matPrefix>mail</mat-icon>
        <input matInput type="email" [(ngModel)]="email" placeholder="you@example.com" name="email" />
      </mat-form-field>

      <mat-form-field appearance="fill" class="w-full">
        <mat-label>Password</mat-label>
        <mat-icon matPrefix>lock</mat-icon>
        <input matInput type="password" [(ngModel)]="password" placeholder="••••••••" name="password" />
      </mat-form-field>

      <mat-form-field appearance="fill" class="w-full">
        <mat-label>Confirm Password</mat-label>
        <mat-icon matPrefix>lock</mat-icon>
        <input matInput type="password" [(ngModel)]="confirmPassword" placeholder="••••••••" name="confirmPassword" />
      </mat-form-field>

      <button mat-flat-button color="primary" class="w-full md-tall-btn" (click)="signUp()">
        <span class="inline-flex items-center gap-2">
          <mat-icon>person_add</mat-icon> Create Account
        </span>
      </button>

      <div class="text-center mt-6">
        <p class="text-sm" style="color: var(--mat-sys-on-surface-variant);">
          Already have an account?
          <a routerLink="/login" class="font-medium" style="color: var(--mat-sys-primary);">Sign in</a>
        </p>
      </div>

      <app-alerts *ngIf="errorMessage" [isSuccess]="false" [alertMessage]="errorMessage"></app-alerts>
    </div>
  </div>
</div>
